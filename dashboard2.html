<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Tracker — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap');

:root{
  --bg:#050508;
  --surface:#0d0d12;
  --border:#151520;
  --accent:#6c47ff;
  --accent2:#ff4747;
  --green:#00e5a0;
  --text:#e8e8f0;
  --muted:#44445a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");opacity:.4;pointer-events:none;z-index:0}

header{padding:28px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;letter-spacing:-.02em}
.logo span{color:var(--accent)}
.live-badge{display:flex;align-items:center;gap:8px;font-size:.65rem;color:var(--green);letter-spacing:.1em}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,160,.4)}50%{box-shadow:0 0 0 8px rgba(0,229,160,0)}}

.container{max-width:1200px;margin:0 auto;padding:40px;position:relative;z-index:1}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px}
.stat-label{font-size:.65rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800}
.stat-value.accent{color:var(--accent)}
.stat-value.green{color:var(--green)}

.main-grid{display:grid;grid-template-columns:360px 1fr;gap:24px;align-items:start}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.panel-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.panel-body{padding:24px}

.qr-wrapper{background:#fff;border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;min-height:180px}
#qrcode{display:flex;align-items:center;justify-content:center}

label{font-size:.7rem;color:var(--muted);letter-spacing:.1em;display:block;margin-bottom:6px}
input,select{width:100%;background:#0a0a10;border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;padding:10px 14px;border-radius:8px;outline:none;transition:.2s;margin-bottom:12px}
input:focus,select:focus{border-color:var(--accent)}
button{width:100%;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:600;cursor:pointer;letter-spacing:.08em;transition:.2s;margin-bottom:8px}
button:hover{background:#7d5bff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:transparent}
.btn-red{background:var(--accent2)}
.btn-red:hover{background:#ff6060}
.btn-sm{width:auto;padding:6px 12px;font-size:.65rem;margin-bottom:0}

.scan-list{display:flex;flex-direction:column}
.scan-item{border-bottom:1px solid var(--border);padding:16px 24px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;transition:.15s;cursor:pointer}
.scan-item:hover{background:rgba(108,71,255,.05)}
.scan-item:last-child{border-bottom:none}
.scan-item.new{animation:newItem .6s ease}
@keyframes newItem{from{background:rgba(0,229,160,.1)}to{background:transparent}}
.scan-num{font-size:1.5rem;font-weight:700;color:var(--border);font-family:'Syne',sans-serif;min-width:40px}
.scan-main{min-width:0}
.scan-id{font-size:.65rem;color:var(--muted);margin-bottom:4px}
.scan-primary{font-size:.85rem;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scan-secondary{font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scan-meta{text-align:right}
.scan-date{font-size:.65rem;color:var(--muted);margin-bottom:4px}
.scan-loc{font-size:.7rem}

.empty{padding:60px 24px;text-align:center;color:var(--muted);font-size:.8rem}
.empty-icon{font-size:2rem;margin-bottom:12px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-family:'Syne',sans-serif;font-size:1.2rem;margin-bottom:24px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-row{background:#0a0a10;border-radius:8px;padding:12px 14px}
.modal-row.full{grid-column:1/-1}
.modal-key{font-size:.6rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.modal-val{font-size:.8rem;word-break:break-all}
.gps-link{color:var(--green);text-decoration:none}
.gps-link:hover{text-decoration:underline}

@media(max-width:900px){.main-grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header>
  <div class="logo">QR<span>Track</span></div>
  <div class="live-badge"><div class="live-dot"></div> LIVE — Firebase</div>
</header>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-label">Total Scans</div><div class="stat-value accent" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">Aujourd'hui</div><div class="stat-value green" id="s-today">0</div></div>
    <div class="stat"><div class="stat-label">Avec GPS</div><div class="stat-value" id="s-gps">0</div></div>
    <div class="stat"><div class="stat-label">Pays uniques</div><div class="stat-value" id="s-countries">0</div></div>
  </div>

  <div class="main-grid">
    <div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">⚡ Générer QR Code</div></div>
        <div class="panel-body">
          <div class="qr-wrapper"><div id="qrcode"><span style="color:#999;font-size:.8rem">Entrez une URL →</span></div></div>
          <label>URL de destination (tracker)</label>
          <input type="url" id="dest-url" placeholder="https://yatus04.github.io/qr-tracker/tracker.html" oninput="updateQR()">
          <label>Taille</label>
          <select id="qr-size" onchange="updateQR()">
            <option value="200">200×200</option>
            <option value="256" selected>256×256</option>
            <option value="300">300×300</option>
          </select>
          <button onclick="downloadQR()">⬇ Télécharger QR Code</button>
          <button class="btn-outline" onclick="prefillURL()">🔗 Utiliser mon URL GitHub</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">📡 Scans en temps réel</div>
        <div style="display:flex;gap:8px">
          <button class="btn-outline btn-sm" onclick="loadScans()">↻</button>
          <button class="btn-red btn-sm" onclick="clearScans()">✕ Vider</button>
        </div>
      </div>
      <div id="scan-list" class="scan-list">
        <div class="empty"><div class="empty-icon">📡</div>Connexion à Firebase...<br>Les scans apparaîtront ici automatiquement.</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">Détails du scan</h2>
    <div class="modal-grid" id="modal-body"></div>
    <button class="btn-outline" style="width:100%;margin-top:20px" onclick="closeModal()">Fermer</button>
  </div>
</div>

<script>
const FIREBASE_URL = 'https://qr-tracker-d4cb6-default-rtdb.firebaseio.com';
let allScans = [];

function prefillURL(){
  const input = document.getElementById('dest-url');
  input.value = 'https://yatus04.github.io/qr-tracker/tracker.html';
  updateQR();
}

function updateQR(){
  const url = document.getElementById('dest-url').value.trim();
  const size = parseInt(document.getElementById('qr-size').value);
  if(!url) return;
  const container = document.getElementById('qrcode');
  container.innerHTML = '';
  new QRCode(container, {text:url, width:size, height:size, colorDark:'#000000', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M});
}

function downloadQR(){
  const canvas = document.querySelector('#qrcode canvas');
  if(!canvas){alert('Générez d\'abord un QR code !');return;}
  const link = document.createElement('a');
  link.download = 'qr-tracker.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function loadScans(){
  try {
    const res = await fetch(`${FIREBASE_URL}/scans.json`);
    const data = await res.json();
    if(!data){ allScans=[]; renderScans([]); updateStats([]); return; }
    allScans = Object.entries(data).map(([key,val])=>({...val, _key:key}))
      .sort((a,b)=>b.id-a.id);
    renderScans(allScans);
    updateStats(allScans);
  } catch(e){
    document.getElementById('scan-list').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Erreur de connexion Firebase.<br>Vérifiez les règles de sécurité.</div>';
  }
}

function updateStats(scans){
  const today = new Date().toDateString();
  document.getElementById('s-total').textContent = scans.length;
  document.getElementById('s-today').textContent = scans.filter(s=>new Date(s.timestamp).toDateString()===today).length;
  document.getElementById('s-gps').textContent = scans.filter(s=>s.lat).length;
  const countries = new Set(scans.map(s=>s.country).filter(c=>c&&c!=='?'));
  document.getElementById('s-countries').textContent = countries.size;
}

function renderScans(scans){
  const el = document.getElementById('scan-list');
  if(!scans.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>Aucun scan pour l\'instant.<br>Scannez votre QR code pour commencer.</div>';
    return;
  }
  el.innerHTML = scans.map((s,i)=>`
    <div class="scan-item" onclick='showDetail(${JSON.stringify(JSON.stringify(s))})'>
      <div class="scan-num">${String(i+1).padStart(2,'0')}</div>
      <div class="scan-main">
        <div class="scan-id">ID #${s.id}</div>
        <div class="scan-primary">🌍 ${s.city||'?'}, ${s.country||'?'} — ${s.ip||'?'}</div>
        <div class="scan-secondary">${s.device||'?'} · ${s.browser||'?'} · ${s.lang||'?'}</div>
      </div>
      <div class="scan-meta">
        <div class="scan-date">${s.date||''}</div>
        <div class="scan-loc" style="color:${s.lat?'var(--green)':'var(--muted)'}">${s.lat?'📍 GPS ✓':'No GPS'}</div>
      </div>
    </div>
  `).join('');
}

function showDetail(jsonStr){
  const s = JSON.parse(jsonStr);
  document.getElementById('modal-title').textContent = `Scan #${s.id}`;
  const rows = [
    ['Date & Heure', s.date],
    ['Adresse IP', s.ip],
    ['Pays', s.country],
    ['Ville', s.city],
    ['FAI / Réseau', s.isp],
    ['Appareil', s.device],
    ['Navigateur', s.browser],
    ['Langue', s.lang],
    ['Fuseau horaire', s.tz],
    ['Résolution écran', s.screen_res],
    ['Source', s.referrer],
    ['Latitude', s.lat ? s.lat.toFixed(7) : 'Non partagée'],
    ['Longitude', s.lon ? s.lon.toFixed(7) : 'Non partagée'],
    ['Précision GPS', s.accuracy ? `±${s.accuracy} m` : '—'],
    ['Google Maps', s.lat ? `<a class="gps-link" href="https://maps.google.com/?q=${s.lat},${s.lon}" target="_blank">Voir sur la carte 🗺</a>` : '—'],
  ];
  document.getElementById('modal-body').innerHTML = rows.map(([k,v])=>
    `<div class="modal-row"><div class="modal-key">${k}</div><div class="modal-val">${v||'—'}</div></div>`
  ).join('');
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
}

async function clearScans(){
  if(!confirm('Vider tous les scans Firebase ?')) return;
  await fetch(`${FIREBASE_URL}/scans.json`, {method:'DELETE'});
  loadScans();
}

// Live polling toutes les 5 secondes
loadScans();
setInterval(loadScans, 5000);

// Auto-prefill URL
window.onload = () => prefillURL();
</script>
</body>
</html>
